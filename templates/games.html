<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Games Arcade - Smart Study Buddy</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0b0f19; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Header & Navigation */
        .header { text-align: center; padding: 20px; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #a855f7; text-shadow: 0 0 15px rgba(168, 85, 247, 0.5); font-size: 2.5rem; }
        .back-btn { position: absolute; left: 30px; top: 30px; color: #ef4444; text-decoration: none; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        .back-btn:hover { background: #ef4444; color: white; box-shadow: 0 0 10px #ef4444; }

        /* Game Selector Menu */
        .game-nav { display: flex; gap: 20px; margin: 30px 0; }
        .nav-btn { padding: 12px 25px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: #38bdf8; border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.6); color: #0b0f19; }

        /* Game Containers */
        .game-section { display: none; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); width: 600px; text-align: center; }
        .game-section.active { display: flex; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .status { font-size: 1.5rem; margin-bottom: 20px; color: #a7f3d0; font-weight: bold; height: 30px;}
        .reset-btn { margin-top: 25px; padding: 10px 20px; background: #ec4899; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .reset-btn:hover { box-shadow: 0 0 15px rgba(236, 72, 153, 0.6); }

        /* --- GAME 1: Tic Tac Toe --- */
        .ttt-board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .cell:hover { background: rgba(255,255,255,0.1); border-color: #38bdf8; }

        /* --- GAME 2: Memory Flip --- */
        .memory-board { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; }
        .card { width: 80px; height: 80px; background: #1e293b; border-radius: 10px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 2.5rem; }
        .card-front { background: rgba(255,255,255,0.05); border: 2px solid #a855f7; }
        .card-back { background: #38bdf8; transform: rotateY(180deg); }

        /* --- GAME 3: Rock Paper Scissors --- */
        .rps-choices { display: flex; gap: 20px; margin-top: 20px; }
        .rps-btn { font-size: 3rem; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; width: 100px; height: 100px; cursor: pointer; transition: 0.3s; }
        .rps-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
        .scores { display: flex; justify-content: space-around; width: 100%; margin-top: 30px; font-size: 1.5rem; color: #9ca3af; }
        .scores span { color: white; font-weight: bold; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="header">
        <a href="/dashboard" class="back-btn">⬅️ Exit Arcade</a>
        <h1>🕹️ Neon Games Arcade</h1>
    </div>

    <div class="game-nav">
        <button class="nav-btn active" onclick="switchGame('tic-tac-toe', this)">Tic-Tac-Toe</button>
        <button class="nav-btn" onclick="switchGame('memory-flip', this)">Memory Flip</button>
        <button class="nav-btn" onclick="switchGame('rps', this)">Rock Paper Scissors</button>
    </div>

    <div id="tic-tac-toe" class="game-section active">
        <div class="status" id="ttt-status">Your Turn (X)</div>
        <div class="ttt-board" id="ttt-board"></div>
        <button class="reset-btn" onclick="initTTT()">Restart Game</button>
    </div>

    <div id="memory-flip" class="game-section">
        <div class="status" id="mem-status">Find the matching pairs!</div>
        <div class="memory-board" id="mem-board"></div>
        <button class="reset-btn" onclick="initMemory()">Shuffle Cards</button>
    </div>

    <div id="rps" class="game-section">
        <div class="status" id="rps-status">Make your move!</div>
        <div class="rps-choices">
            <button class="rps-btn" onclick="playRPS('✊')">✊</button>
            <button class="rps-btn" onclick="playRPS('✋')">✋</button>
            <button class="rps-btn" onclick="playRPS('✌️')">✌️</button>
        </div>
        <div class="scores">
            <div>You<br><span id="rps-user-score">0</span></div>
            <div>Bot<br><span id="rps-bot-score">0</span></div>
        </div>
        <button class="reset-btn" onclick="resetRPSScore()" style="margin-top: 40px;">Reset Scores</button>
    </div>


    <script>
        // --- System Logic (Switching Games) ---
        function switchGame(gameId, btn) {
            document.querySelectorAll('.game-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(gameId).classList.add('active');
            btn.classList.add('active');
        }

        // --- 1. TIC TAC TOE LOGIC ---
        let tttCells = ['', '', '', '', '', '', '', '', ''];
        let tttActive = true;
        const tttBoard = document.getElementById('ttt-board');
        const tttStatus = document.getElementById('ttt-status');

        function initTTT() {
            tttCells = ['', '', '', '', '', '', '', '', ''];
            tttActive = true;
            tttStatus.innerText = "Your Turn (X)";
            tttBoard.innerHTML = '';
            for(let i=0; i<9; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => tttMove(i, cell);
                tttBoard.appendChild(cell);
            }
        }

        function tttMove(idx, cell) {
            if(tttCells[idx] === '' && tttActive) {
                tttCells[idx] = 'X';
                cell.innerText = 'X';
                cell.style.color = '#38bdf8';
                if(checkTTTWin('X')) return tttEnd("You Win! 🎉");
                if(!tttCells.includes('')) return tttEnd("It's a Draw! 🤝");
                
                tttStatus.innerText = "Bot is thinking...";
                setTimeout(tttBotMove, 500);
            }
        }

        function tttBotMove() {
            if(!tttActive) return;
            let empty = tttCells.map((val, i) => val === '' ? i : null).filter(v => v !== null);
            if(empty.length > 0) {
                let idx = empty[Math.floor(Math.random() * empty.length)];
                tttCells[idx] = 'O';
                let cell = tttBoard.children[idx];
                cell.innerText = 'O';
                cell.style.color = '#ec4899';
                if(checkTTTWin('O')) return tttEnd("Bot Wins! 🤖");
                if(!tttCells.includes('')) return tttEnd("It's a Draw! 🤝");
                tttStatus.innerText = "Your Turn (X)";
            }
        }

        function checkTTTWin(player) {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            return wins.some(p => tttCells[p[0]] === player && tttCells[p[1]] === player && tttCells[p[2]] === player);
        }

        function tttEnd(msg) {
            tttStatus.innerText = msg;
            tttActive = false;
        }

        // --- 2. MEMORY FLIP LOGIC ---
        const emojis = ['💻', '🚀', '🎮', '👾', '🎧', '📱', '🔋', '💡'];
        let memCards = [...emojis, ...emojis]; // Duplicate for pairs
        let flippedCards = [];
        let matchedPairs = 0;
        let memBoard = document.getElementById('mem-board');
        let memStatus = document.getElementById('mem-status');

        function initMemory() {
            memBoard.innerHTML = '';
            matchedPairs = 0;
            flippedCards = [];
            memStatus.innerText = "Find the matching pairs!";
            memCards.sort(() => Math.random() - 0.5); // Shuffle

            memCards.forEach((emoji, i) => {
                let card = document.createElement('div');
                card.className = 'card';
                card.dataset.val = emoji;
                card.innerHTML = `
                    <div class="card-front">❓</div>
                    <div class="card-back">${emoji}</div>
                `;
                card.onclick = () => flipCard(card);
                memBoard.appendChild(card);
            });
        }

        function flipCard(card) {
            if(flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push(card);
                
                if(flippedCards.length === 2) {
                    setTimeout(checkMemMatch, 800);
                }
            }
        }

        function checkMemMatch() {
            let [c1, c2] = flippedCards;
            if(c1.dataset.val === c2.dataset.val) {
                matchedPairs++;
                if(matchedPairs === 8) memStatus.innerText = "You found all pairs! 🏆";
            } else {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
            }
            flippedCards = [];
        }

        // --- 3. ROCK PAPER SCISSORS LOGIC ---
        let userScore = 0;
        let botScore = 0;
        const rpsOptions = ['✊', '✋', '✌️'];
        const rpsStatus = document.getElementById('rps-status');

        function playRPS(userChoice) {
            let botChoice = rpsOptions[Math.floor(Math.random() * 3)];
            let result = "";

            if(userChoice === botChoice) result = "It's a Tie! 🤜🤛";
            else if(
                (userChoice === '✊' && botChoice === '✌️') ||
                (userChoice === '✋' && botChoice === '✊') ||
                (userChoice === '✌️' && botChoice === '✋')
            ) {
                result = "You Win this round! 🔥";
                userScore++;
            } else {
                result = "Bot Wins this round! 🤖";
                botScore++;
            }

            rpsStatus.innerHTML = `You: ${userChoice} &nbsp;vs&nbsp; Bot: ${botChoice}<br><span style="color:white; font-size:1.2rem;">${result}</span>`;
            document.getElementById('rps-user-score').innerText = userScore;
            document.getElementById('rps-bot-score').innerText = botScore;
        }

        function resetRPSScore() {
            userScore = 0; botScore = 0;
            document.getElementById('rps-user-score').innerText = '0';
            document.getElementById('rps-bot-score').innerText = '0';
            rpsStatus.innerText = "Make your move!";
        }

        // Initialize games on load
        initTTT();
        initMemory();
    </script>
</body>
</html>
