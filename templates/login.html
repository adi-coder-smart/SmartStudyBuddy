<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Study Buddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0f19; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Premium Background Glows */
        .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(56, 189, 248, 0.2), transparent 70%); top: -150px; left: -150px; z-index: -1; animation: float 6s infinite alternate; }
        .glow2 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(168, 85, 247, 0.2), transparent 70%); bottom: -150px; right: -150px; z-index: -1; animation: float 8s infinite alternate-reverse; }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 30px); } }

        .auth-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        h1 { color: #38bdf8; margin-bottom: 10px; font-size: 2rem; }
        p { color: #9ca3af; margin-bottom: 30px; font-size: 0.95rem; }

        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }

        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); transform: translateY(-2px); }

        .toggle-text { margin-top: 20px; color: #9ca3af; font-size: 0.9rem; }
        .toggle-text span { color: #38bdf8; cursor: pointer; font-weight: bold; }

        .msg { padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; }
        .error-msg { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .success-msg { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }

        #signup-box { display: none; }
    </style>
</head>
<body>
    <div class="glow"></div><div class="glow2"></div>

    <div class="auth-container">
        {% if error %} <div class="msg error-msg">{{ error }}</div> {% endif %}
        {% if success %} <div class="msg success-msg">{{ success }}</div> {% endif %}

        <div id="login-box">
            <h1>Welcome</h1>
            <p>Access your study hub</p>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="toggle-text">New here? <span onclick="toggleForms()">Sign Up</span></div>
        </div>

        <div id="signup-box">
            <h1>Sign Up</h1>
            <p>Create your account</p>
            <form action="/signup" method="POST">
                <input type="text" name="username" placeholder="Choose Username" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <button type="submit" class="btn" style="background: linear-gradient(135deg, #10b981, #3b82f6);">Create Account</button>
            </form>
            <div class="toggle-text">Already a member? <span onclick="toggleForms()">Login</span></div>
        </div>
    </div>

    <script>
        function toggleForms() {
            var lb = document.getElementById('login-box'), sb = document.getElementById('signup-box');
            if (lb.style.display === 'none') { lb.style.display = 'block'; sb.style.display = 'none'; }
            else { lb.style.display = 'none'; sb.style.display = 'block'; }
        }
    </script>
</body>
</html>
